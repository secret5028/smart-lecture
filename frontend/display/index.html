<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Copilot 학생 화면</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(circle at 10% 10%, #1e293b 0%, #0f172a 45%, #020617 100%) fixed;
      color: #e2e8f0;
      font-family: "Noto Sans KR", "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .layer { position: absolute; inset: 0; }
    #slide-layer {
      z-index: 10;
      display: grid;
      grid-template-rows: 88px 1fr 52px;
      opacity: 0;
      transform: translateY(20px);
      transition: transform 300ms ease, opacity 300ms ease;
    }
    #slide-layer.show {
      opacity: 1;
      transform: translateY(0);
    }
    #avatar-layer { z-index: 20; display: none; }
    #interaction-layer { z-index: 30; display: none; }

    .header {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      background: rgba(15, 23, 42, 0.92);
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
      font-size: 1.2vw;
      color: #cbd5e1;
    }
    .header div:nth-child(2) { text-align: center; }
    .header div:nth-child(3) {
      font-weight: 700;
      color: #67e8f9;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(8, 145, 178, 0.2);
    }

    .content {
      display: grid;
      grid-template-columns: 1fr minmax(280px, 42%);
      gap: 2vw;
      padding: 3vh 4vw 2vh;
      align-items: stretch;
      min-height: 0;
    }
    .content.no-image {
      grid-template-columns: 1fr;
    }
    .text-wrap {
      min-width: 0;
      background: rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(100, 116, 139, 0.26);
      border-radius: 20px;
      padding: 2.2vh 1.6vw;
      box-shadow: inset 0 0 0 1px rgba(30, 41, 59, 0.3);
    }
    .title {
      margin: 0 0 2.4vh;
      font-size: clamp(46px, 6vw, 108px);
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.02em;
      line-height: 1.06;
    }
    .bullets {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 1.5vh;
    }
    .bullets li {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: start;
      column-gap: 12px;
      font-size: clamp(22px, 2.5vw, 46px);
      line-height: 1.34;
      color: #f1f5f9;
    }
    .bullets li::before {
      content: "";
      width: 14px;
      height: 14px;
      margin-top: 0.6em;
      border-radius: 50%;
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.35);
    }

    .image-pane {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      padding: 10px;
      min-height: 240px;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .image-pane.show { display: flex; }
    #slide-image {
      max-width: 100%;
      max-height: 58vh;
      object-fit: contain;
      border-radius: 10px;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 22px 16px;
      border-top: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(2, 6, 23, 0.75);
    }
    .progress-track {
      position: relative;
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.24);
      overflow: hidden;
    }
    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee 0%, #3b82f6 52%, #a78bfa 100%);
      transition: width 260ms ease;
    }
    .progress-text {
      font-size: 1vw;
      color: #cbd5e1;
      min-width: 120px;
      text-align: right;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="slide-layer" class="layer">
    <header class="header">
      <div id="subject">과목명 미설정</div>
      <div id="section">현재 섹션 미설정</div>
      <div id="header-progress">0% 완료</div>
    </header>

    <main class="content no-image" id="content-wrap">
      <section class="text-wrap">
        <h1 class="title" id="slide-title">강의 시작 대기 중</h1>
        <ul class="bullets" id="slide-bullets"></ul>
      </section>
      <aside class="image-pane" id="image-pane">
        <img id="slide-image" alt="슬라이드 이미지" />
      </aside>
    </main>

    <footer class="footer">
      <div class="progress-track"><div id="slide-progress-bar" class="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0% 완료</div>
    </footer>
  </div>

  <div id="avatar-layer" class="layer"></div>
  <div id="interaction-layer" class="layer"></div>

  <script>
    const slideLayer = document.getElementById('slide-layer');
    const contentWrap = document.getElementById('content-wrap');
    const titleEl = document.getElementById('slide-title');
    const bulletsEl = document.getElementById('slide-bullets');
    const imagePane = document.getElementById('image-pane');
    const imageEl = document.getElementById('slide-image');
    const subjectEl = document.getElementById('subject');
    const sectionEl = document.getElementById('section');
    const headerProgressEl = document.getElementById('header-progress');
    const progressEl = document.getElementById('slide-progress-bar');
    const progressTextEl = document.getElementById('progress-text');

    function toWebPath(path) {
      if (!path) return null;
      if (String(path).startsWith('/chunks/')) return path;
      const normalized = String(path).replaceAll('\\\\', '/');
      const parts = normalized.split('/');
      const name = parts[parts.length - 1];
      return name ? `/chunks/${encodeURIComponent(name)}` : null;
    }

    async function resolveImagePath(slide) {
      if (slide.image_url) return slide.image_url;
      if (slide.image_path) return toWebPath(slide.image_path);
      if (!slide.image_id) return null;
      try {
        const res = await fetch(`/api/knowledge/chunks/${encodeURIComponent(slide.image_id)}`);
        if (!res.ok) return null;
        const chunk = await res.json();
        return chunk.image_url || toWebPath(chunk.image_path) || null;
      } catch (_) {
        return null;
      }
    }

    async function renderSlide(slide) {
      slideLayer.classList.remove('show');

      const imgPath = await resolveImagePath(slide || {});

      setTimeout(() => {
        titleEl.textContent = slide.title || '제목 없음';
        bulletsEl.innerHTML = '';
        (slide.bullets || []).forEach((b) => {
          const li = document.createElement('li');
          li.textContent = b;
          bulletsEl.appendChild(li);
        });

        if (imgPath) {
          imageEl.src = imgPath;
          imageEl.onerror = () => {
            imageEl.removeAttribute('src');
            imagePane.classList.remove('show');
            contentWrap.classList.add('no-image');
          };
          imagePane.classList.add('show');
          contentWrap.classList.remove('no-image');
        } else {
          imageEl.removeAttribute('src');
          imagePane.classList.remove('show');
          contentWrap.classList.add('no-image');
        }

        const pct = Math.max(0, Math.min(100, Number(slide.progress_pct || 0)));
        subjectEl.textContent = slide.subject || '과목명 미설정';
        sectionEl.textContent = slide.current_section || '현재 섹션 미설정';
        headerProgressEl.textContent = `${pct}% 완료`;
        progressTextEl.textContent = `${pct}% 완료`;
        progressEl.style.width = `${pct}%`;

        slideLayer.classList.add('show');
      }, 150);
    }

    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/display`);
    ws.onopen = () => slideLayer.classList.add('show');
    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.event === 'slide_change') renderSlide(msg.payload.slide || {});
    };
  </script>
</body>
</html>
